version: '3.8'

services:
  hermit:
    build:
      context: ../..
      dockerfile: benchmarks/competitors/docker/Dockerfile.hermit
    volumes:
      - ./ontologies:/ontologies:ro
      - ./results:/results
    command: ["/ontologies/test.owl", "consistency"]
    
