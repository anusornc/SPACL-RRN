name: Blockchain Specs Validation

on:
  push:
    paths:
      - "specs/blockchain/**"
      - "scripts/validate_blockchain_specs.sh"
      - ".github/workflows/blockchain-specs.yml"
  pull_request:
    paths:
      - "specs/blockchain/**"
      - "scripts/validate_blockchain_specs.sh"
      - ".github/workflows/blockchain-specs.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install schema validation deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Run blockchain spec validation
        env:
          STRICT_SCHEMA_VALIDATION: "1"
        run: |
          chmod +x scripts/validate_blockchain_specs.sh
          scripts/validate_blockchain_specs.sh
